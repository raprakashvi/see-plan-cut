<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>See, Plan, Cut</title>
  <meta name="description" content="Paper website: See, Plan, Cut — MPC-Based Autonomous Volumetric Robotic Laser Surgery with OCT Guidance." />

  <meta property="og:title" content="See, Plan, Cut" />
  <meta property="og:description" content="MPC-Based Autonomous Volumetric Robotic Laser Surgery with OCT Guidance" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/img/teaser.jpg" />

  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="#top">See·Plan·Cut</a>
      <nav class="nav">
        <a href="#overview">Overview</a>
        <a href="#media">Media</a>
        <a href="#team">Team</a>
        <a href="#ack">Acknowledgements</a>
        <a href="#bibtex">BibTeX</a>
      </nav>
    </div>
  </header>

  <main id="top">
    <section class="hero">
      <div class="container hero-grid">
        <div>
          <div class="kicker" id="paper-venue">arXiv</div>
          <h1 id="paper-title">See, Plan, Cut</h1>
          <p class="subtitle" id="paper-subtitle"></p>

          <div class="authors" id="author-list"></div>

          <div class="cta-row" id="cta-row"></div>

          <div class="affils" id="paper-affils"></div>
        </div>

        <figure class="teaser">
          <img id="teaser-img" src="assets/img/teaser.jpg" alt="Teaser figure" />
          <figcaption id="teaser-caption"></figcaption>
        </figure>
      </div>
    </section>

    <section id="overview" class="section">
      <div class="container">
        <h2>Abstract</h2>
        <p class="prose" id="paper-abstract"></p>
      </div>
    </section>

    <section id="media" class="section">
      <div class="container">
        <h2>Figure</h2>

        <!-- One large featured figure -->
        <figure class="featured-figure">
          <img id="featured-img" src="assets/img/figures/fig1.jpg" alt="Featured figure" />
          <figcaption id="featured-caption"></figcaption>
        </figure>

        <!-- Scrollable strip of other figures -->
        <div class="thumb-strip-wrap">
          <div class="thumb-strip" id="thumb-strip"></div>
        </div>

        <div class="video-wrap" id="video-wrap" style="display:none;">
        <h3>Video</h3>

        <div class="ratio-16x9">
          <!-- Thumbnail button (shown first) -->
          <button class="video-thumb" id="video-thumb" type="button" aria-label="Play video">
            <img id="video-thumb-img" src="" alt="Video thumbnail" loading="lazy" />
            <div class="video-play">Play</div>
          </button>

          <!-- Iframe (loaded only after click) -->
          <iframe
            id="video-embed"
            src=""
            title="Video"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
            style="display:none;"
          ></iframe>
        </div>
      </div>


    <section id="team" class="section">
      <div class="container">
        <h2>Authors</h2>
        <div class="people" id="people-grid"></div>
      </div>
    </section>

    <section id="ack" class="section">
      <div class="container">
        <h2>Acknowledgements</h2>

        <div class="card ack-card">
          <p class="prose" id="ack-text"></p>
        </div>
      </div>
    </section>

    <section id="logos" class="section">
      <div class="container">
        <div class="logos-row" id="logos-row"></div>
      </div>
    </section>

    <section id="bibtex" class="section">
      <div class="container">
        <h2>Citation</h2>
        <div class="bibtex">
          <div class="bibtex-bar">
            <button class="btn secondary" id="copy-bib">Copy BibTeX</button>
            <span class="small" id="doi-line"></span>
          </div>
          <pre><code id="bibtex-block"></code></pre>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container footer-inner">
        <span class="small" id="footer-left"></span>
        <span class="small" id="last-updated"></span>
      </div>
    </footer>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
